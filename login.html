<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - GreenPass Smart Tourism</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fas fa-mountain"></i>
        <div>
          <span class="logo-title">GreenPass</span>
          <span class="logo-sub">Tourist Management</span>
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="booking.html">Book Now</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-buttons">
        <a href="login.html" class="btn-outline active">Login</a>
        <a href="signup.html" class="btn-primary">Sign Up</a>
      </div>
      <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box">
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-mountain"></i></div>
        <h2>Welcome Back</h2>
        <p>Login to your GreenPass account</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Enter your email" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPass" placeholder="Enter your password" required/>
            <i class="fas fa-eye toggle-pass" onclick="togglePass('loginPass')"></i>
          </div>
        </div>
        <div class="form-check">
          <label><input type="checkbox"/> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-social"><i class="fab fa-google"></i> Continue with Google</button>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 GreenPass Tourist Management System. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
