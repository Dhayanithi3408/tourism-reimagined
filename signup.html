<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - GreenPass Smart Tourism</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fas fa-mountain"></i>
        <div>
          <span class="logo-title">GreenPass</span>
          <span class="logo-sub">Tourist Management</span>
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="booking.html">Book Now</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-buttons">
        <a href="login.html" class="btn-outline">Login</a>
        <a href="signup.html" class="btn-primary">Sign Up</a>
      </div>
      <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box auth-box-wide">
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-mountain"></i></div>
        <h2>Create Account</h2>
        <p>Join thousands of responsible travelers</p>
      </div>
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="First name" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Last name" required/>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Enter your email" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-icon">
            <i class="fas fa-phone"></i>
            <input type="tel" placeholder="Enter your phone number" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPass" placeholder="Create a password" required/>
            <i class="fas fa-eye toggle-pass" onclick="togglePass('signupPass')"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPass" placeholder="Confirm your password" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Travel Preference</label>
          <select>
            <option>Adventure & Trekking</option>
            <option>Nature & Wildlife</option>
            <option>Cultural & Heritage</option>
            <option>Pilgrimage</option>
            <option>Leisure & Relaxation</option>
          </select>
        </div>
        <div class="form-check">
          <label><input type="checkbox" required/> I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn-primary btn-full">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-social" onclick="openGoogleModal()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 GreenPass Tourist Management System. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/google-auth.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
