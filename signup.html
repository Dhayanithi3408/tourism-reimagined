<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - GreenPass Smart Tourism</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fas fa-mountain"></i>
        <div>
          <span class="logo-title">GreenPass</span>
          <span class="logo-sub">Tourist Management</span>
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="booking.html">Book Now</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-buttons">
        <a href="login.html" class="btn-outline">Login</a>
        <a href="signup.html" class="btn-primary">Sign Up</a>
      </div>
      <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box auth-box-wide">
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-mountain"></i></div>
        <h2>Create Account</h2>
        <p>Join thousands of responsible travelers</p>
      </div>
      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="First name" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" placeholder="Last name" required/>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Enter your email" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <div class="input-icon">
            <i class="fas fa-phone"></i>
            <input type="tel" placeholder="Enter your phone number" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPass" placeholder="Create a password" required/>
            <i class="fas fa-eye toggle-pass" onclick="togglePass('signupPass')"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPass" placeholder="Confirm your password" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Travel Preference</label>
          <select>
            <option>Adventure & Trekking</option>
            <option>Nature & Wildlife</option>
            <option>Cultural & Heritage</option>
            <option>Pilgrimage</option>
            <option>Leisure & Relaxation</option>
          </select>
        </div>
        <div class="form-check">
          <label><input type="checkbox" required/> I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn-primary btn-full">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-social"><i class="fab fa-google"></i> Sign up with Google</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 GreenPass Tourist Management System. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
